name: Sync submissions.csv

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest CSV from Render API
        run: |
          mkdir -p data
          curl -fsSL "https://charros-jalisco-sistema-encuestas.onrender.com/api/submissions.csv" -o data/submissions.csv.new

          # Validate header exists to avoid committing error responses
          head -n 1 data/submissions.csv.new | grep -q '^submissionId,'

          mv data/submissions.csv.new data/submissions.csv

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- data/submissions.csv; then
            echo "No CSV changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/submissions.csv
          git commit -m "chore: sync submissions.csv"
          git push
